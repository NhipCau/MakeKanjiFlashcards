name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit
        run: |
          curl --silent \
               --location \
               --max-redirs 5 \
               --connect-timeout 10 \
               -A "Mozilla/5.0" \
               https://makekanjiflashcards.streamlit.app/ \
               > /dev/null
